<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTracker</title>
    <style>
        :root {
            --base-font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --break-color: #fca5a5;
            --success: #34d399;
            --overtime: #c084fc;
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--base-font);
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #020617, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Layout Wrapper */
        .app-wrapper {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            align-items: flex-start;
        }

        @media (max-width: 850px) {
            .app-wrapper {
                grid-template-columns: 1fr;
            }
        }

        /* Glass Containers */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 28px;
            box-shadow: var(--glass-shadow);
        }

        .history-panel {
            padding: 30px;
            max-height: 800px;
            overflow-y: auto;
        }

        /* Custom Scrollbar for History */
        .history-panel::-webkit-scrollbar { width: 8px; }
        .history-panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .history-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        h1, h2 {
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            color: var(--text-main);
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        h2 { font-size: 1.2rem; margin-bottom: 20px; }

        /* Setup Section */
        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .setup-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setup-box label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        input[type="time"], input[type="number"].inline-input {
            background: transparent;
            color: var(--text-main);
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding: 5px 0;
            font-size: 1.2rem;
            font-weight: bold;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="time"]:focus, input[type="number"].inline-input:focus {
            border-bottom-color: var(--accent);
        }

        /* Predictor Display */
        .predictor-box {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            border-radius: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .predictor-label {
            color: var(--text-muted);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .sign-off-time {
            font-size: 4rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
            letter-spacing: -2px;
            line-height: 1;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.15);
            padding: 20px 10px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .text-break { color: var(--break-color); }
        .text-work { color: var(--text-main); }
        .text-overtime { color: var(--overtime); }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        button.main-btn {
            border: none;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            flex-grow: 1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #actionBtn { background: linear-gradient(135deg, #0ea5e9, #3b82f6); }
        #actionBtn.on-break { background: linear-gradient(135deg, #f87171, #ef4444); }
        #resetBtn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            flex-grow: 0;
            padding: 20px 30px;
        }

        /* Manual Entry Panel */
        .manual-panel {
            background: rgba(0, 0, 0, 0.2);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .manual-panel-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 10px;
        }

        .manual-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .manual-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            width: 140px;
            font-weight: 500;
        }

        .time-input-group {
            display: flex;
            gap: 8px;
            flex-grow: 1;
        }

        .manual-row input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            outline: none;
            text-align: center;
        }

        .manual-row button {
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            background-color: transparent;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-break { border: 1px solid var(--break-color); color: var(--break-color); }
        .btn-work { border: 1px solid var(--accent); color: var(--accent); }

        /* History Ledger Styles */
        .history-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .history-header {
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
        }

        .history-header:hover { background: rgba(255,255,255,0.05); }

        .history-date { font-weight: 600; font-size: 0.95rem; }
        .history-time { color: var(--text-muted); font-size: 0.85rem; }

        .history-body {
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: none;
        }

        .history-item.active .history-body { display: block; }

        .history-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }

        .history-notes {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            resize: vertical;
            min-height: 60px;
            font-size: 0.9rem;
            outline: none;
        }

        .history-notes:focus { border-color: var(--accent); }

        .empty-history {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .footer-credit {
            margin-top: 30px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .footer-credit span { color: var(--accent); font-weight: 600; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="glass-panel">
            <h1>WorkTracker</h1>

            <div class="setup-grid">
                <div class="setup-box">
                    <label for="startTime">Clock-In Time</label>
                    <input type="time" id="startTime" onchange="saveDataAndRender()">
                </div>
                <div class="setup-box">
                    <label for="plannedOt">Planned OT (Hours)</label>
                    <input type="number" id="plannedOt" class="inline-input" value="0" min="0" step="0.5" onchange="saveDataAndRender()">
                </div>
            </div>

            <div class="predictor-box">
                <div class="predictor-label" id="signOffLabel">Projected End of Shift</div>
                <div class="sign-off-time" id="signOffDisplay">--:--</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Active Work</div>
                    <div class="stat-value text-work" id="workTimeDisplay">00:00:00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Break Duration</div>
                    <div class="stat-value text-break" id="breakTimeDisplay">00:00:00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Overtime Accrued</div>
                    <div class="stat-value text-overtime" id="overtimeDisplay">00:00:00</div>
                </div>
            </div>

            <div class="controls">
                <button id="actionBtn" class="main-btn" onclick="toggleState()">Start Work</button>
                <button id="resetBtn" class="main-btn" onclick="resetApp()">Reset</button>
            </div>

            <div class="manual-panel">
                <div class="manual-panel-title">Manual Time Adjustment</div>
                
                <div class="manual-row">
                    <span class="manual-label">Log Missed Break:</span>
                    <div class="time-input-group">
                        <input type="number" id="manualBreakHr" placeholder="Hrs">
                        <input type="number" id="manualBreakMin" placeholder="Mins">
                    </div>
                    <button class="btn-break" onclick="addManualTime('break')">Apply</button>
                </div>
                
                <div class="manual-row">
                    <span class="manual-label">Log Offline Work:</span>
                    <div class="time-input-group">
                        <input type="number" id="manualWorkHr" placeholder="Hrs">
                        <input type="number" id="manualWorkMin" placeholder="Mins">
                    </div>
                    <button class="btn-work" onclick="addManualTime('work')">Apply</button>
                </div>
            </div>
        </div>

        <div class="glass-panel history-panel">
            <h2>Shift History</h2>
            <div id="historyContainer">
                </div>
        </div>
    </div>

    <div class="footer-credit">
        App made by <span>JeremiaKusuma</span>
    </div>

    <script>
        const BASE_GOAL_HOURS = 8;
        const BASE_TARGET_SECONDS = BASE_GOAL_HOURS * 3600;
        
        let accumulatedWork = 0;
        let accumulatedBreak = 0;
        let sessionStart = 0;
        let currentState = 'idle'; 
        let activeInterval = null;
        let shiftHistory = [];

        const startTimeInput = document.getElementById('startTime');
        const plannedOtInput = document.getElementById('plannedOt');
        const signOffDisplay = document.getElementById('signOffDisplay');
        const signOffLabel = document.getElementById('signOffLabel');
        const workTimeDisplay = document.getElementById('workTimeDisplay');
        const breakTimeDisplay = document.getElementById('breakTimeDisplay');
        const overtimeDisplay = document.getElementById('overtimeDisplay');
        const actionBtn = document.getElementById('actionBtn');
        const historyContainer = document.getElementById('historyContainer');

        function formatDuration(totalSecs) {
            const h = Math.floor(totalSecs / 3600).toString().padStart(2, '0');
            const m = Math.floor((totalSecs % 3600) / 60).toString().padStart(2, '0');
            const s = (totalSecs % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function getCurrentTotals() {
            let work = accumulatedWork;
            let brk = accumulatedBreak;
            const now = Date.now();
            if (currentState === 'working') work += Math.floor((now - sessionStart) / 1000);
            else if (currentState === 'break') brk += Math.floor((now - sessionStart) / 1000);
            return { work, brk };
        }

        function calculateSignOff(currentBreakSeconds, plannedOtHours) {
            if (!startTimeInput.value) return;
            const [startHour, startMin] = startTimeInput.value.split(':').map(Number);
            const totalGoalHours = BASE_GOAL_HOURS + plannedOtHours;
            const totalMinutesNeeded = (totalGoalHours * 60) + Math.floor(currentBreakSeconds / 60);
            
            let finalHour = startHour + Math.floor(totalMinutesNeeded / 60);
            let finalMin = startMin + (totalMinutesNeeded % 60);
            if (finalMin >= 60) { finalHour += 1; finalMin -= 60; }

            const ampm = finalHour >= 12 && finalHour < 24 ? 'PM' : 'AM';
            const displayHour = finalHour % 12 || 12;
            const displayMin = finalMin.toString().padStart(2, '0');
            return `${displayHour}:${displayMin} ${ampm}`;
        }

        function updateDisplays() {
            const totals = getCurrentTotals();
            const plannedOtHours = parseFloat(plannedOtInput.value) || 0;
            const dynamicTargetSeconds = (BASE_GOAL_HOURS + plannedOtHours) * 3600;
            
            let standardSeconds = totals.work;
            let accruedOvertimeSeconds = 0;
            
            if (totals.work > BASE_TARGET_SECONDS) {
                standardSeconds = BASE_TARGET_SECONDS;
                accruedOvertimeSeconds = totals.work - BASE_TARGET_SECONDS;
            }

            workTimeDisplay.textContent = formatDuration(standardSeconds);
            overtimeDisplay.textContent = formatDuration(accruedOvertimeSeconds);
            breakTimeDisplay.textContent = formatDuration(totals.brk);

            if (totals.work >= dynamicTargetSeconds && currentState === 'working') {
                signOffLabel.textContent = "Shift Status";
                signOffDisplay.textContent = "UNPLANNED OT";
                signOffDisplay.style.color = "var(--overtime)";
            } else {
                signOffLabel.textContent = "Projected End of Shift";
                signOffDisplay.textContent = calculateSignOff(totals.brk, plannedOtHours);
                signOffDisplay.style.color = "var(--accent)";
            }
            saveState();
        }

        function saveDataAndRender() { saveState(); updateDisplays(); }

        function toggleState() {
            if (currentState === 'done') return;
            const now = Date.now();

            if (currentState === 'idle') {
                const [hours, minutes] = startTimeInput.value.split(':').map(Number);
                const d = new Date(); d.setHours(hours, minutes, 0, 0);
                if (d.getTime() < now) accumulatedWork = Math.floor((now - d.getTime()) / 1000);
                
                currentState = 'working'; sessionStart = now;
                actionBtn.textContent = "Take Break"; actionBtn.classList.remove('on-break');
                activeInterval = setInterval(updateDisplays, 1000);
            } else if (currentState === 'working') {
                accumulatedWork += Math.floor((now - sessionStart) / 1000);
                currentState = 'break'; sessionStart = now;
                actionBtn.textContent = "Resume Work"; actionBtn.classList.add('on-break');
            } else if (currentState === 'break') {
                accumulatedBreak += Math.floor((now - sessionStart) / 1000);
                currentState = 'working'; sessionStart = now;
                actionBtn.textContent = "Take Break"; actionBtn.classList.remove('on-break');
            }
            updateDisplays();
        }

        function addManualTime(type) {
            const hrInput = document.getElementById(type === 'break' ? 'manualBreakHr' : 'manualWorkHr');
            const minInput = document.getElementById(type === 'break' ? 'manualBreakMin' : 'manualWorkMin');
            const addedSeconds = ((parseInt(hrInput.value) || 0) * 3600) + ((parseInt(minInput.value) || 0) * 60);

            if (addedSeconds > 0) {
                if (type === 'break') {
                    accumulatedBreak += addedSeconds;
                    accumulatedWork = Math.max(0, accumulatedWork - addedSeconds);
                } else if (type === 'work') { accumulatedWork += addedSeconds; }
                hrInput.value = ''; minInput.value = ''; updateDisplays();
            }
        }

        function finishAndLogDay() {
            if (currentState === 'idle') return;
            if (activeInterval) clearInterval(activeInterval);
            const now = Date.now();
            if (currentState === 'working') accumulatedWork += Math.floor((now - sessionStart) / 1000);
            else if (currentState === 'break') accumulatedBreak += Math.floor((now - sessionStart) / 1000);
            
            currentState = 'done';
            actionBtn.textContent = "Finish Day";
            
            const dateObj = new Date();
            const dateString = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            
            const [startH, startM] = startTimeInput.value.split(':');
            const startAmPm = startH >= 12 ? 'PM' : 'AM';
            const formattedStart = `${startH % 12 || 12}:${startM} ${startAmPm}`;
            
            const endH = dateObj.getHours();
            const endM = dateObj.getMinutes().toString().padStart(2, '0');
            const endAmPm = endH >= 12 ? 'PM' : 'AM';
            const formattedEnd = `${endH % 12 || 12}:${endM} ${endAmPm}`;

            const standardSecs = accumulatedWork > BASE_TARGET_SECONDS ? BASE_TARGET_SECONDS : accumulatedWork;
            const otSecs = accumulatedWork > BASE_TARGET_SECONDS ? accumulatedWork - BASE_TARGET_SECONDS : 0;

            const shiftData = {
                id: Date.now(),
                date: dateString,
                timeRange: `${formattedStart} - ${formattedEnd}`,
                work: formatDuration(standardSecs),
                ot: formatDuration(otSecs),
                break: formatDuration(accumulatedBreak),
                notes: ""
            };

            const existingIndex = shiftHistory.findIndex(s => s.date === dateString);
            if(existingIndex >= 0) shiftHistory[existingIndex] = shiftData;
            else shiftHistory.unshift(shiftData); 

            saveState();
            renderHistory();
        }

        function resetApp() {
            finishAndLogDay();
            
            if (confirm("Permanently clear the active tracker for a new shift? (Your data has been saved to the History)")) {
                accumulatedWork = 0; accumulatedBreak = 0; sessionStart = 0; currentState = 'idle';
                actionBtn.textContent = "Start Work"; actionBtn.classList.remove('on-break');
                
                const now = new Date();
                startTimeInput.value = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
                plannedOtInput.value = "0";
                
                saveState(); updateDisplays();
            }
        }

        // --- HISTORY LEDGER FUNCTIONS ---
        function renderHistory() {
            historyContainer.innerHTML = '';
            if (shiftHistory.length === 0) {
                historyContainer.innerHTML = '<div class="empty-history">No shifts recorded yet.</div>';
                return;
            }

            shiftHistory.forEach((shift, index) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div class="history-header" onclick="this.parentElement.classList.toggle('active')">
                        <span class="history-date">${shift.date}</span>
                        <span class="history-time">${shift.timeRange}</span>
                    </div>
                    <div class="history-body">
                        <div class="history-stats">
                            <span style="color: var(--text-main)">Work: ${shift.work}</span>
                            <span style="color: var(--overtime)">OT: ${shift.ot}</span>
                            <span style="color: var(--break-color)">Break: ${shift.break}</span>
                        </div>
                        <textarea class="history-notes" placeholder="Add shift notes (e.g., Client rigging, grading papers...)" onchange="updateNote(${index}, this.value)">${shift.notes}</textarea>
                    </div>
                `;
                historyContainer.appendChild(item);
            });
        }

        function updateNote(index, text) {
            shiftHistory[index].notes = text;
            saveState();
        }

        // --- LOCAL STORAGE DATA HANDLING ---
        function saveState() {
            const data = {
                accumulatedWork, accumulatedBreak, sessionStart, currentState,
                clockInTime: startTimeInput.value, plannedOt: plannedOtInput.value,
                history: shiftHistory
            };
            localStorage.setItem('workTrackerData', JSON.stringify(data));
        }

        function loadState() {
            const savedData = localStorage.getItem('workTrackerData');
            if (savedData) {
                const data = JSON.parse(savedData);
                accumulatedWork = data.accumulatedWork || 0;
                accumulatedBreak = data.accumulatedBreak || 0;
                sessionStart = data.sessionStart || 0;
                currentState = data.currentState || 'idle';
                startTimeInput.value = data.clockInTime;
                plannedOtInput.value = data.plannedOt || "0";
                shiftHistory = data.history || [];

                if (currentState === 'working') {
                    actionBtn.textContent = "Take Break";
                    activeInterval = setInterval(updateDisplays, 1000);
                } else if (currentState === 'break') {
                    actionBtn.textContent = "Resume Work"; actionBtn.classList.add('on-break');
                    activeInterval = setInterval(updateDisplays, 1000);
                } else if (currentState === 'done') {
                    actionBtn.textContent = "Finish Day";
                }
            } else {
                const initNow = new Date();
                startTimeInput.value = `${initNow.getHours().toString().padStart(2, '0')}:${initNow.getMinutes().toString().padStart(2, '0')}`;
            }
            updateDisplays();
            renderHistory();
        }

        loadState();
    </script>
</body>
</html>
