<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTracker</title>
    <style>
        :root {
            --base-font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --break-color: #fca5a5;
            --success: #34d399;
            --overtime: #c084fc;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--base-font);
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #020617, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 550px; 
            position: relative;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 35px;
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            width: 100%;
        }

        /* Branding */
        .branding-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .app-logo {
            width: 50px;
            height: auto;
            margin-bottom: 10px;
            border-radius: 8px;
            display: none;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Tab Content Area */
        .tab-content {
            display: none;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .tab-content.active { display: block; }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Setup Section */
        .setup-grid { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; padding-bottom: 25px; border-bottom: 1px solid var(--glass-border); }
        .setup-box { display: flex; flex-direction: column; gap: 5px; align-items: center; }
        .setup-box label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        input[type="time"], input[type="number"].inline-input { background: transparent; color: var(--text-main); border: none; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 5px 0; font-size: 1.2rem; font-weight: 500; outline: none; text-align: center; width: 120px; transition: border-color 0.3s; }
        input[type="time"]:focus, input[type="number"].inline-input:focus { border-bottom-color: var(--accent); }

        /* Predictor Box */
        .predictor-box { text-align: center; margin-bottom: 35px; }
        .predictor-label { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .sign-off-time { font-size: 4.5rem; font-weight: 700; color: var(--accent); text-shadow: 0 0 35px var(--accent-glow); letter-spacing: -2px; line-height: 1; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 35px; }
        .stat-card { background: rgba(255, 255, 255, 0.03); padding: 15px 5px; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.02); }
        .stat-title { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-size: 1.2rem; font-weight: 600; font-variant-numeric: tabular-nums; }
        .text-break { color: var(--break-color); }
        .text-overtime { color: var(--overtime); }

        /* Controls */
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .main-btn { border: none; padding: 16px; font-size: 0.9rem; font-weight: 600; border-radius: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; }
        
        #actionBtn { flex: 2; background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: #fff; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.25); }
        #actionBtn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(59, 130, 246, 0.35); }
        #actionBtn.on-break { background: linear-gradient(135deg, #f87171, #ef4444); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.25); }
        
        #endWorkBtn { flex: 1.5; background: rgba(52, 211, 153, 0.15); border: 1px solid rgba(52, 211, 153, 0.3); color: var(--success); }
        #endWorkBtn:hover { background: rgba(52, 211, 153, 0.25); }

        #resetBtn { flex: 1; background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); }
        #resetBtn:hover { background: rgba(255, 255, 255, 0.1); color: white; }

        /* Manual Panel */
        .toggle-manual-btn { background: none; border: none; color: var(--text-muted); font-size: 0.8rem; width: 100%; text-align: center; padding: 10px; cursor: pointer; transition: color 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .toggle-manual-btn:hover { color: var(--text-main); }
        .manual-panel { background: rgba(0, 0, 0, 0.2); padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border); display: none; flex-direction: column; gap: 15px; margin-top: 10px; }
        .manual-panel.open { display: flex; }
        .manual-row { display: flex; gap: 10px; align-items: center; }
        .manual-label { font-size: 0.8rem; color: var(--text-muted); width: 120px; }
        .time-input-group { display: flex; gap: 8px; flex-grow: 1; }
        .manual-row input { width: 100%; background: rgba(255,255,255,0.03); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; outline: none; text-align: center; }
        .manual-row button { padding: 8px 12px; font-size: 0.8rem; font-weight: 600; background-color: transparent; border-radius: 8px; cursor: pointer; }
        .btn-break { border: 1px solid var(--break-color); color: var(--break-color); }
        .btn-work { border: 1px solid var(--accent); color: var(--accent); }

        /* History Content Area */
        #historyContainer { max-height: 500px; overflow-y: auto; padding-right: 5px; margin-bottom: 20px; }
        #historyContainer::-webkit-scrollbar { width: 5px; }
        #historyContainer::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        
        .history-month-header { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 0; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .history-month-header:first-child { margin-top: 0; }

        .history-item { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .history-header { padding: 12px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s;}
        .history-header:hover { background: rgba(255,255,255,0.05); }
        .history-date { font-weight: 500; font-size: 0.9rem; }
        .history-body { padding: 15px; border-top: 1px solid rgba(255,255,255,0.02); display: none; background: rgba(0,0,0,0.15); }
        .history-item.active .history-body { display: block; }
        .history-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; font-size: 0.75rem; }
        .history-badge { background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px; }
        
        .history-notes { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); color: var(--text-main); padding: 10px; border-radius: 8px; min-height: 60px; font-size: 0.85rem; outline: none; transition: border-color 0.2s; margin-bottom: 10px;}
        .history-notes:focus { border-color: var(--accent); }

        .btn-delete-history { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; width: 100%; }
        .btn-delete-history:hover { background: rgba(239, 68, 68, 0.2); }

        .data-mgmt { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; display: flex; justify-content: center; gap: 20px; }
        .btn-data { background: none; border: none; color: var(--text-muted); font-size: 0.75rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: color 0.2s; }
        .btn-data:hover { color: var(--text-main); }

        /* Footer & Logo */
        .footer-credit { margin-top: 30px; font-size: 0.75rem; color: rgba(255, 255, 255, 0.3); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .footer-credit span { color: var(--accent); font-weight: 600; }
        .footer-icon { width: 18px; height: 18px; border-radius: 4px; object-fit: contain; }
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="glass-panel">
            
            <div class="branding-header">
                <img src="logo.png" alt="Logo" class="app-logo" onload="this.style.display='block'" onerror="this.style.display='none'">
                <h1>WorkTracker</h1>
            </div>

            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('tracker')">Tracker</button>
                <button class="tab-btn" onclick="switchTab('history')">History</button>
            </div>

            <div id="trackerTab" class="tab-content active">
                <div class="setup-grid">
                    <div class="setup-box">
                        <label>Clock-In Time</label>
                        <input type="time" id="startTime" onchange="saveDataAndRender()">
                    </div>
                    <div class="setup-box">
                        <label>Planned OT (Hrs)</label>
                        <input type="number" id="plannedOt" class="inline-input" value="0" min="0" step="0.5" onchange="saveDataAndRender()">
                    </div>
                </div>

                <div class="predictor-box">
                    <div class="predictor-label" id="signOffLabel">Projected End of Shift</div>
                    <div class="sign-off-time" id="signOffDisplay">--:--</div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-title">Active Work</div>
                        <div class="stat-value" id="workTimeDisplay">00:00:00</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">Break Time</div>
                        <div class="stat-value text-break" id="breakTimeDisplay">00:00:00</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">Overtime</div>
                        <div class="stat-value text-overtime" id="overtimeDisplay">00:00:00</div>
                    </div>
                </div>

                <div class="controls">
                    <button id="actionBtn" class="main-btn" onclick="toggleState()">Start Work</button>
                    <button id="endWorkBtn" class="main-btn" onclick="endWork()">End Work</button>
                    <button id="resetBtn" class="main-btn" onclick="pureReset()">Reset</button>
                </div>

                <button class="toggle-manual-btn" onclick="document.getElementById('manualPanel').classList.toggle('open')">
                    Adjust Time Manually
                </button>

                <div class="manual-panel" id="manualPanel">
                    <div class="manual-row">
                        <span class="manual-label">Log Missed Break:</span>
                        <div class="time-input-group">
                            <input type="number" id="manualBreakHr" placeholder="Hrs">
                            <input type="number" id="manualBreakMin" placeholder="Mins">
                        </div>
                        <button class="btn-break" onclick="addManualTime('break')">Apply</button>
                    </div>
                    <div class="manual-row">
                        <span class="manual-label">Log Offline Work:</span>
                        <div class="time-input-group">
                            <input type="number" id="manualWorkHr" placeholder="Hrs">
                            <input type="number" id="manualWorkMin" placeholder="Mins">
                        </div>
                        <button class="btn-work" onclick="addManualTime('work')">Apply</button>
                    </div>
                </div>
            </div>

            <div id="historyTab" class="tab-content">
                <div id="historyContainer"></div>

                <div class="data-mgmt">
                    <button class="btn-data" onclick="exportData()">Backup JSON</button>
                    <button class="btn-data" onclick="document.getElementById('fileInput').click()">Restore JSON</button>
                    <input type="file" id="fileInput" style="display:none" onchange="importData(event)" accept=".json">
                </div>
            </div>

        </div>
    </div>

    <div class="footer-credit">
        APP MADE BY <span>SIRKENTC</span>
        <img src="footer-logo.png" alt="" class="footer-icon" onerror="this.style.display='none'">
    </div>

    <script>
        const BASE_GOAL = 8 * 3600;
        let accumulatedWork = 0, accumulatedBreak = 0, sessionStart = 0, currentState = 'idle', shiftHistory = [];
        let activeInterval = null;

        const startTimeInput = document.getElementById('startTime');
        const plannedOtInput = document.getElementById('plannedOt');
        const signOffDisplay = document.getElementById('signOffDisplay');
        const signOffLabel = document.getElementById('signOffLabel');
        const workTimeDisplay = document.getElementById('workTimeDisplay');
        const breakTimeDisplay = document.getElementById('breakTimeDisplay');
        const overtimeDisplay = document.getElementById('overtimeDisplay');
        const actionBtn = document.getElementById('actionBtn');
        const historyContainer = document.getElementById('historyContainer');

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        function formatDuration(s) {
            const h = Math.floor(s / 3600).toString().padStart(2, '0');
            const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
            const sec = (s % 60).toString().padStart(2, '0');
            return `${h}:${m}:${sec}`;
        }

        function getCurrentTotals() {
            let w = accumulatedWork, b = accumulatedBreak;
            const now = Date.now();
            if (currentState === 'working') w += Math.floor((now - sessionStart) / 1000);
            else if (currentState === 'break') b += Math.floor((now - sessionStart) / 1000);
            return { w, b };
        }

        function updateDisplays() {
            const { w, b } = getCurrentTotals();
            const plannedOtSec = (parseFloat(plannedOtInput.value) || 0) * 3600;
            const totalGoalSec = BASE_GOAL + plannedOtSec;

            let std = w > BASE_GOAL ? BASE_GOAL : w;
            let ot = w > BASE_GOAL ? w - BASE_GOAL : 0;

            workTimeDisplay.textContent = formatDuration(std);
            overtimeDisplay.textContent = formatDuration(ot);
            breakTimeDisplay.textContent = formatDuration(b);

            if (w >= totalGoalSec && currentState === 'working') {
                signOffLabel.textContent = "Shift Status";
                signOffDisplay.textContent = "UNPLANNED OT";
                signOffDisplay.style.color = "var(--overtime)";
            } else {
                signOffLabel.textContent = "Projected End of Shift";
                signOffDisplay.textContent = calculateSignOff(b, parseFloat(plannedOtInput.value) || 0);
                signOffDisplay.style.color = "var(--accent)";
            }
            saveState();
        }

        function calculateSignOff(breakSec, otHr) {
            if (!startTimeInput.value) return "--:--";
            const [h, m] = startTimeInput.value.split(':').map(Number);
            const totalMins = (8 + otHr) * 60 + Math.floor(breakSec / 60);
            let finalH = h + Math.floor(totalMins / 60), finalM = m + (totalMins % 60);
            if (finalM >= 60) { finalH++; finalM -= 60; }
            const ampm = finalH >= 12 && finalH < 24 ? 'PM' : 'AM';
            return `${finalH % 12 || 12}:${finalM.toString().padStart(2, '0')} ${ampm}`;
        }

        function toggleState() {
            const now = Date.now();
            if (currentState === 'idle') {
                const [h, m] = startTimeInput.value.split(':').map(Number);
                const d = new Date(); d.setHours(h, m, 0, 0);
                if (d.getTime() < now) accumulatedWork = Math.floor((now - d.getTime()) / 1000);
                currentState = 'working'; sessionStart = now;
                actionBtn.textContent = "Take Break";
                activeInterval = setInterval(updateDisplays, 1000);
            } else if (currentState === 'working') {
                accumulatedWork += Math.floor((now - sessionStart) / 1000);
                currentState = 'break'; sessionStart = now;
                actionBtn.textContent = "Resume Work"; actionBtn.classList.add('on-break');
            } else if (currentState === 'break') {
                accumulatedBreak += Math.floor((now - sessionStart) / 1000);
                currentState = 'working'; sessionStart = now;
                actionBtn.textContent = "Take Break"; actionBtn.classList.remove('on-break');
            }
            updateDisplays();
        }

        function addManualTime(type) {
            const hr = document.getElementById(type === 'break' ? 'manualBreakHr' : 'manualWorkHr');
            const min = document.getElementById(type === 'break' ? 'manualBreakMin' : 'manualWorkMin');
            const s = ((parseInt(hr.value) || 0) * 3600) + ((parseInt(min.value) || 0) * 60);
            if (s > 0) {
                if (type === 'break') { accumulatedBreak += s; accumulatedWork = Math.max(0, accumulatedWork - s); }
                else { accumulatedWork += s; }
                hr.value = ''; min.value = ''; updateDisplays();
            }
        }

        function endWork() {
            if (currentState === 'idle') {
                alert("You have no active shift to end.");
                return;
            }
            
            const now = Date.now();
            if (currentState === 'working') accumulatedWork += Math.floor((now - sessionStart) / 1000);
            else if (currentState === 'break') accumulatedBreak += Math.floor((now - sessionStart) / 1000);
            
            const timestampId = Date.now();
            const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            
            const shift = {
                id: timestampId,
                date: dateStr,
                work: formatDuration(accumulatedWork > BASE_GOAL ? BASE_GOAL : accumulatedWork),
                ot: formatDuration(accumulatedWork > BASE_GOAL ? accumulatedWork - BASE_GOAL : 0),
                break: formatDuration(accumulatedBreak), 
                notes: ""
            };
            
            shiftHistory.unshift(shift);
            
            wipeTimerToIdle();
        }

        function pureReset() {
            if (currentState === 'idle' && accumulatedWork === 0 && accumulatedBreak === 0) return;
            
            if (confirm("Wipe the current timer? This will NOT save the shift to your history.")) {
                wipeTimerToIdle();
            }
        }

        function wipeTimerToIdle() {
            clearInterval(activeInterval);
            accumulatedWork = 0; accumulatedBreak = 0; sessionStart = 0; currentState = 'idle';
            actionBtn.textContent = "Start Work"; actionBtn.classList.remove('on-break');
            const n = new Date(); startTimeInput.value = `${n.getHours().toString().padStart(2, '0')}:${n.getMinutes().toString().padStart(2, '0')}`;
            plannedOtInput.value = "0"; 
            saveState(); updateDisplays(); renderHistory();
        }

        function deleteHistoryItem(id) {
            if(confirm("Permanently delete this shift record?")) {
                shiftHistory = shiftHistory.filter(s => s.id !== id);
                saveState();
                renderHistory();
            }
        }

        function renderHistory() {
            historyContainer.innerHTML = '';
            if (shiftHistory.length === 0) {
                historyContainer.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:0.85rem;margin-top:20px;">No history yet.</div>';
                return;
            }

            // Group shifts by Month and Year
            const groupedShifts = {};
            shiftHistory.forEach(s => {
                const dateObj = new Date(s.id);
                const monthYear = dateObj.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                if (!groupedShifts[monthYear]) groupedShifts[monthYear] = [];
                groupedShifts[monthYear].push(s);
            });

            // Render groups
            for (const [month, shifts] of Object.entries(groupedShifts)) {
                const monthHeader = document.createElement('div');
                monthHeader.className = 'history-month-header';
                monthHeader.textContent = month;
                historyContainer.appendChild(monthHeader);

                shifts.forEach(s => {
                    const idx = shiftHistory.findIndex(sh => sh.id === s.id);
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `
                        <div class="history-header" onclick="this.parentElement.classList.toggle('active')">
                            <span class="history-date">${s.date}</span>
                            <span style="font-size: 0.75rem; color: var(--text-muted);">▼</span>
                        </div>
                        <div class="history-body">
                            <div class="history-stats">
                                <span class="history-badge">Work: ${s.work}</span>
                                <span class="history-badge" style="color: var(--overtime);">OT: ${s.ot}</span>
                                <span class="history-badge" style="color: var(--break-color);">Break: ${s.break}</span>
                            </div>
                            <textarea class="history-notes" placeholder="Shift notes..." onchange="shiftHistory[${idx}].notes=this.value;saveState()">${s.notes}</textarea>
                            <button class="btn-delete-history" onclick="deleteHistoryItem(${s.id})">Delete Entry</button>
                        </div>`;
                    historyContainer.appendChild(div);
                });
            }
        }

        function exportData() {
            const blob = new Blob([localStorage.getItem('workTrackerData')], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `WorkTracker_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { localStorage.setItem('workTrackerData', ev.target.result); location.reload(); };
            reader.readAsText(e.target.files[0]);
        }

        function saveState() { localStorage.setItem('workTrackerData', JSON.stringify({ accumulatedWork, accumulatedBreak, sessionStart, currentState, clockInTime: startTimeInput.value, plannedOt: plannedOtInput.value, history: shiftHistory })); }

        function loadState() {
            const d = JSON.parse(localStorage.getItem('workTrackerData'));
            if (d) {
                accumulatedWork = d.accumulatedWork || 0; accumulatedBreak = d.accumulatedBreak || 0; sessionStart = d.sessionStart || 0; currentState = d.currentState || 'idle';
                startTimeInput.value = d.clockInTime; plannedOtInput.value = d.plannedOt || 0; shiftHistory = d.history || [];
                if (currentState !== 'idle') {
                    actionBtn.textContent = currentState === 'working' ? "Take Break" : "Resume Work";
                    if (currentState === 'break') actionBtn.classList.add('on-break');
                    activeInterval = setInterval(updateDisplays, 1000);
                }
            } else {
                const n = new Date(); startTimeInput.value = `${n.getHours().toString().padStart(2, '0')}:${n.getMinutes().toString().padStart(2, '0')}`;
            }
            updateDisplays(); renderHistory(); 
        }

        loadState();
    </script>
</body>
</html>
